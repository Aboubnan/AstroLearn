{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 my-10">
    <h2 class="text-3xl font-bold text-white mb-6 flex items-center">
        <i class="fas fa-plus-circle mr-3 text-green-500"></i> Ajouter un Objet Céleste
    </h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        
        <div>
            <label class="block text-gray-400 mb-2 font-medium">Nom de l'objet</label>
            <input type="text" name="name" required placeholder="Ex: Proxima Centauri" 
                   class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition">
        </div>

        <div>
            <label class="block text-gray-400 mb-2 font-medium">Type d'astre</label>
            <select name="category_id" required class="...">
                <option value="" disabled selected>-- Sélectionnez --</option>
                {% for cat in categories %}
                    {# cat[0] est l'ID (ex: 1, 2, 3) #}
                    <option value="{{ cat[0] }}">{{ cat[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-gray-400 mb-2 font-medium">Description</label>
            <textarea name="description" rows="4" required placeholder="Décrivez les caractéristiques de cet objet..." 
                      class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-green-500 transition"></textarea>
        </div>

        <div>
            <label class="block text-gray-400 mb-2 font-medium">Image de l'objet</label>
            <div class="relative group">
                <input type="file" name="image" accept="image/*" onchange="previewImage(event)"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white 
                              file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 
                              file:text-sm file:font-semibold file:bg-indigo-600 file:text-white 
                              hover:file:bg-indigo-700 transition">
            </div>
            <p class="text-xs text-gray-500 mt-1">Formats acceptés : JPG, PNG, WEBP.</p>
            <img id="preview" class="mt-4 hidden w-full h-48 object-cover rounded-lg border border-gray-600">
        </div>

        <div class="flex space-x-4 pt-4">
            <button type="submit" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-lg">
                <i class="fas fa-save mr-2"></i> Enregistrer l'objet
            </button>
            <a href="{{ url_for('admin_bp.admin_dashboard') }}" class="flex-1 bg-gray-700 hover:bg-gray-600 text-center py-3 rounded-lg text-white transition">
                Annuler
            </a>
        </div>
    </form>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('preview');
            output.src = reader.result;
            output.classList.remove('hidden');
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
{% endblock %}
