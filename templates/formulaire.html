{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-8">

    <section class="text-center py-6 bg-gray-900 rounded-xl shadow-xl border border-gray-700">
        <h1 class="text-4xl font-extrabold text-white mb-2">
            Votre Avis Compte !
        </h1>
        <p class="text-lg text-gray-400">
            Aidez-nous à améliorer AstroLearn en répondant à notre court sondage sur votre objet céleste préféré.
        </p>
    </section>

    <section class="bg-gray-800 p-4 sm:p-6 rounded-xl shadow-2xl border border-gray-700">
        <h2 class="text-2xl font-semibold text-white mb-4 border-b border-gray-700 pb-3">
            Sondage "Objet Céleste Favori"
        </h2>

        <div class="w-full">
            <iframe id="tally-iframe"
                src="{{ external_url }}"
                width="100%" 
                height="1500"
                frameborder="0"
                scrolling="no"
                title="Sondage AstroLearn"
                style="border: none; width: 100%; min-height: 1500px; display: block;">
            </iframe>
        </div>
    </section>
</div>

<script>
    // Écoute les messages de hauteur envoyés par Tally
    window.addEventListener("message", function(event) {
        if (event.data && event.data.type === "tally-height") {
            var iframe = document.getElementById("tally-iframe");
            if (iframe) {
                iframe.style.height = event.data.height + "px";
            }
        }
    });

    // Fallback : réinitialise Tally après chargement si disponible
    document.addEventListener("DOMContentLoaded", function () {
        if (window.Tally) {
            window.Tally.loadEmbeds();
        } else {
            document.getElementById("tally-iframe").addEventListener("load", function () {
                if (window.Tally) window.Tally.loadEmbeds();
            });
        }
    });
</script>
{% endblock content %}
