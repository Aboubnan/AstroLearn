{% extends "base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-12">

    <a href="{{ url_for('main_bp.catalogue') }}" class="inline-flex items-center text-gray-400 hover:text-accent transition duration-150">
        <i class="fas fa-arrow-left mr-2"></i> Retour au Catalogue
    </a>

    <div class="bg-gray-800 rounded-3xl shadow-2xl p-6 lg:p-10 grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">

        <div class="space-y-6">
            <h1 id="trans-title" class="text-4xl lg:text-5xl font-extrabold text-white leading-tight">
                {{ obj.nom_fr }}
            </h1>
            <p class="text-lg font-semibold text-accent uppercase tracking-wider">
                <i class="fas fa-tag mr-2"></i> <span id="trans-cat">{{ obj.nom_categorie }}</span>
            </p>

            <div class="rounded-xl overflow-hidden shadow-xl border-4 border-gray-700">
                <img src="{% if 'http' in obj.url_image %}{{ obj.url_image }}{% else %}{{ url_for('static', filename=obj.url_image) }}{% endif %}" 
                    alt="{{ obj.nom_fr }}" 
                    class="w-full h-auto object-cover">
            </div>
        </div>

        <div class="space-y-8">
            <section class="prose max-w-none prose-invert">
                <div class="flex justify-between items-center border-b border-gray-700 pb-2 mb-4">
                    <h2 class="text-3xl font-bold text-white mb-0">Description</h2>
                    
                    <div class="flex items-center bg-gray-900 p-1 rounded-full border border-gray-700">
                        <button id="lang-en" onclick="setLanguage('en')" class="px-4 py-1 rounded-full text-xs font-bold transition-all">ENG</button>
                        <button id="lang-fr" onclick="setLanguage('fr')" class="px-4 py-1 rounded-full text-xs font-bold transition-all">FRA</button>
                    </div>
                </div>

                <div class="relative min-h-[120px]">
                    <p id="trans-desc" class="text-gray-300 text-lg leading-relaxed whitespace-pre-line">
                        {{ obj.description }}
                    </p>

                    <div id="loader" class="hidden absolute inset-0 bg-gray-800 bg-opacity-60 flex items-center justify-center rounded-lg">
                        <i class="fas fa-rocket fa-spin text-accent text-3xl"></i>
                    </div>
                </div>
            </section>

            <section class="bg-gray-900 p-6 rounded-xl border border-gray-700">
                <h2 class="text-2xl font-bold text-accent mb-4">Données Techniques</h2>
                <dl class="space-y-3">
                    <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                        <dt class="text-gray-400">Type :</dt>
                        <dd id="trans-cat-tech" class="text-white font-semibold">{{ obj.nom_categorie }}</dd>
                    </div>
                    <div class="flex justify-between items-center">
                        <dt class="text-gray-400">Publication :</dt>
                        <dd class="text-white font-semibold">{{ obj.date_publication }}</dd>
                    </div>
                </dl>
            </section>
        </div>
    </div>
</div>

<script>
    // 1. On prépare les données originales
    const originalData = {
        title: {{ obj.nom_fr|tojson }},
        cat: {{ obj.nom_categorie|tojson }},
        desc: {{ obj.description|tojson }}
    };
    
    let cache = {};

    async function applyLanguage(lang) {
        const loader = document.getElementById('loader');
        const elements = {
            title: document.getElementById('trans-title'),
            cat: document.getElementById('trans-cat'),
            catTech: document.getElementById('trans-cat-tech'),
            desc: document.getElementById('trans-desc')
        };

        // UI des boutons
        document.getElementById('lang-en').className = `px-4 py-1 rounded-full text-xs font-bold ${lang === 'en' ? 'bg-accent text-gray-900' : 'text-gray-500'}`;
        document.getElementById('lang-fr').className = `px-4 py-1 rounded-full text-xs font-bold ${lang === 'fr' ? 'bg-accent text-gray-900' : 'text-gray-500'}`;

        if (cache[lang]) {
            updateUI(cache[lang], elements);
            return;
        }

        loader.classList.remove('hidden');

        try {
            // On envoie un tableau de textes à traduire pour économiser les appels
            const textsToTranslate = [originalData.title, originalData.cat, originalData.desc];
            
            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    text: textsToTranslate.join(' ||| '), // On délimite les textes
                    lang: lang 
                })
            });
            const data = await response.json();
            
            if (data.translated_text) {
                const parts = data.translated_text.split(' ||| ');
                cache[lang] = { title: parts[0], cat: parts[1], desc: parts[2] };
                updateUI(cache[lang], elements);
            }
        } catch (err) {
            console.error(err);
        } finally {
            loader.classList.add('hidden');
        }
    }

    function updateUI(data, el) {
        el.title.innerText = data.title;
        el.cat.innerText = data.cat;
        el.catTech.innerText = data.cat;
        el.desc.innerText = data.desc;
    }

    function setLanguage(lang) {
        localStorage.setItem('preferred_lang', lang);
        applyLanguage(lang);
    }

    document.addEventListener('DOMContentLoaded', () => {
        applyLanguage(localStorage.getItem('preferred_lang') || 'fr');
    });
</script>
{% endblock %}
