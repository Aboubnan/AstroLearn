{% extends "base.html" %}

{% block content %}
<div class="space-y-12 max-w-7xl mx-auto py-8">
    <h1 class="text-3xl md:text-5xl font-extrabold text-white text-center mb-8">
        Encyclopédie Astronomique
    </h1>
    
    <!-- Barre de recherche -->
<section class="bg-gray-800 p-6 rounded-xl shadow-2xl sticky top-20 z-40 mb-8 border border-accent/30 overflow-visible">
    <form method="GET" action="{{ url_for('main_bp.catalogue') }}" class="flex flex-col md:flex-row gap-4 items-end overflow-visible">
        
        <div class="flex-grow w-full md:w-auto">
            <label for="search" class="block text-sm font-medium text-gray-300 mb-1">
                Rechercher par nom / description
            </label>
            <input type="text" 
                   name="search_term" 
                   id="search" 
                   placeholder="Ex: Galaxie Andromède..."
                   class="w-full bg-gray-700 text-white border border-gray-600 rounded-lg py-2 px-4 focus:ring-accent focus:border-accent text-sm"
                   value="{{ request.args.get('search_term', '') }}">
        </div>

        <div class="w-full md:w-64">
            <label for="category_id" class="block text-sm font-medium text-gray-300 mb-1">
                Filtrer par catégorie
            </label>
            <select name="category_id" 
                    id="category_id"
                    class="w-full bg-gray-700 text-white border border-gray-600 rounded-lg py-2 px-4 focus:ring-accent focus:border-accent text-sm">
                <option value="">Toutes les catégories</option>
                {% set current_category_id = request.args.get('category_id', '') | int %}
                {% for cat in categories %}
                    <option value="{{ cat.id_categorie }}" 
                            {% if cat.id_categorie == current_category_id %}selected{% endif %}>
                        {{ cat.nom_categorie }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" 
                class="w-full md:w-auto bg-accent hover:bg-accent-dark text-white font-bold py-2 px-6 rounded-lg transition duration-200">
            <i class="fas fa-search"></i>
        </button>

    </form>
</section>

    <!-- Grille d'objets -->
    <section>
        {% if objects %}
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                {% for obj in objects %}
                    <div class="bg-gray-800 rounded-xl overflow-hidden shadow-xl hover:shadow-accent/50 transition duration-300 transform hover:scale-105">
                        <a href="{{ url_for('main_bp.object_detail', object_id=obj.id_objet) }}">
                            <img src="{% if 'http' in obj.url_image %}{{ obj.url_image }}{% else %}{{ url_for('static', filename=obj.url_image) }}{% endif %}" 
                                alt="{{ obj.nom_fr }}" 
                                class="w-full h-48 object-cover"
                                onerror="this.src='https://placehold.co/400x300/1f2937/d1d5db?text={{ obj.nom_fr }}'">
                        </a>
                        <div class="p-4">
                            <h3 class="text-lg md:text-xl font-semibold text-white truncate" title="{{ obj.nom_fr }}">
                                {{ obj.nom_fr }}
                            </h3>
                            <span class="inline-block px-3 py-1 text-xs font-semibold bg-accent/20 text-accent rounded-full mt-2">
                                {{ obj.nom_categorie }}
                            </span>
                            <p class="text-gray-400 mt-2 text-sm line-clamp-3">
                                {{ obj.extrait_description }}
                            </p>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="text-center p-20 bg-gray-800 rounded-xl">
                <i class="fas fa-search text-6xl text-gray-600 mb-4"></i>
                <p class="text-2xl text-gray-400 mb-4">Aucun résultat trouvé</p>
                <a href="{{ url_for('main_bp.catalogue') }}" 
                   class="inline-block px-6 py-3 bg-accent text-white rounded-lg hover:bg-accent-dark transition">
                    Voir tout le catalogue
                </a>
            </div>
        {% endif %}
    </section>
</div>

<style>
.line-clamp-3 {
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
</style>

{% endblock content %}
