{% extends "base.html" %}

{% block content %}
<section class="text-center py-6 bg-gray-900 rounded-xl shadow-xl border border-gray-700">
        <h1 class="text-4xl font-extrabold text-white mb-2">
            Systéme solaire interactive
        </h1>
        <p class="text-lg text-gray-400">
            Explorez le système solaire en 3D ! Cliquez sur une planète pour voir ses informations.
        </p>
</section>

    <!-- Conteneur pour la scène 3D -->
<div id="solar-system-container" style="width: 100%; height: 620px; background-color: #000; position: relative; overflow: hidden;">
</div>
    <!-- Modal pour les infos (cachée par défaut) -->
    <div id="planet-modal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0d1117; color: #c9d1d9; padding: 20px; border: 1px solid #ffaa00; border-radius: 10px; z-index: 1000; max-width: 400px;">
        <h3 id="modal-title"></h3>
        <p id="modal-info"></p>
        <button onclick="closeModal()" style="background: #ffaa00; color: #000; border: none; padding: 10px; cursor: pointer;">Fermer</button>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="{{ url_for('static', filename='js/solar_system.js') }}"></script>

    <style>
    #solar-system-container {
        height: 600px;
    }
    @media (max-width: 480px) {
        #solar-system-container {
        height: 400px;
        }
    }
    </style>

{% endblock %}
